<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glass Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
    </div>
    
    <div class="container">
        <div class="glass-preview" id="preview">
            <h2>Glassmorphism</h2>
            <p>Настрой ползунки, чтобы получить CSS код.</p>
        </div>
        
        <div class="controls glass-panel">
            <div class="control-group">
                <label>Прозрачность (Opacity): <span id="opacity-val">0.2</span></label>
                <input type="range" id="opacity" min="0" max="1" step="0.05" value="0.2">
            </div>
            
            <div class="control-group">
                <label>Размытие (Blur): <span id="blur-val">10</span>px</label>
                <input type="range" id="blur" min="0" max="50" step="1" value="10">
            </div>
            
            <div class="code-output">
                <pre><code id="css-code"></code></pre>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
